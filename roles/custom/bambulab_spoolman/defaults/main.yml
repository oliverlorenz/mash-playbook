---
# Project source code URL: https://github.com/Donkie/Spoolman

bambulab_spoolman_enabled: true

bambulab_spoolman_identifier: bambulab-spoolman
bambulab_spoolman_base_path: "{{ mash_playbook_base_path }}/{{ bambulab_spoolman_identifier }}"

# renovate: datasource=docker depName=ghcr.io/rdiger-36/bambulab-ams-spoolman-filamentstatus
bambulab_spoolman_version: latest

bambulab_spoolman_scheme: https

# The hostname at which Spoolman is served.
bambulab_spoolman_hostname: ""
bambulab_spoolman_printers: []

# The path at which Spoolman is exposed.
# This value must either be `/` or not end with a slash (e.g. `/bambulab_spoolman`).
#
# Hosting Spoolman under a subpath does not seem to be possible due to Spoolman's
# technical limitations.
bambulab_spoolman_path_prefix:
bambulab_spoolman_printer_path: "{{ bambulab_spoolman_base_path }}/printer"

bambulab_spoolman_container_image: "{{ bambulab_spoolman_container_image_registry_prefix }}rdiger-36/bambulab-ams-spoolman-filamentstatus:{{ bambulab_spoolman_container_image_tag }}"
bambulab_spoolman_container_image_tag: "{{ bambulab_spoolman_version }}"
bambulab_spoolman_container_image_registry_prefix: "{{ bambulab_spoolman_container_image_registry_prefix_upstream }}"
bambulab_spoolman_container_image_registry_prefix_upstream: "{{ bambulab_spoolman_container_image_registry_prefix_upstream_default }}"
bambulab_spoolman_container_image_registry_prefix_upstream_default: ghcr.io/
bambulab_spoolman_container_image_force_pull: "{{ bambulab_spoolman_container_image.endswith(':latest') }}"

bambulab_spoolman_container_image_self_build: false
bambulab_spoolman_container_image_self_build_name: "rdiger-36/bambulab-ams-spoolman-filamentstatus:{{ bambulab_spoolman_container_image_self_build_repo_version }}"
bambulab_spoolman_container_image_self_build_repo: "https://github.com/Rdiger-36/bambulab-ams-spoolman-filamentstatus.git"
bambulab_spoolman_container_image_self_build_repo_version: "{{ 'v' + bambulab_spoolman_version if bambulab_spoolman_version != 'latest' else 'main' }}"
bambulab_spoolman_container_image_self_build_src_files_path: "{{ bambulab_spoolman_base_path }}/docker-src"

# Controls whether the container exposes its HTTP port (tcp/3000 in the container).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:3000"), or empty string to not expose.
bambulab_spoolman_container_http_host_bind_port: ""

# The base container network. It will be auto-created by this role if it doesn't exist already.
bambulab_spoolman_container_network: "{{ bambulab_spoolman_identifier }}"

# The port number in the container
bambulab_spoolman_container_http_port: 4000

# Spoolman specific settings

bambulab_spoolman_container_environment_port: "{{ bambulab_spoolman_container_http_port }}"

bambulab_spoolman_environment_variables_additional_variables: ""

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
# Use this to expose this container to another reverse proxy, which runs in a different container network.
bambulab_spoolman_container_additional_networks: "{{ bambulab_spoolman_container_additional_networks_auto + bambulab_spoolman_container_additional_networks_custom }}"
bambulab_spoolman_container_additional_networks_auto: []
bambulab_spoolman_container_additional_networks_custom: []

# A list of additional "volumes" to mount in the container.
# This list gets populated dynamically at runtime. You can provide a different default value,
# if you wish to mount your own files into the container.
# Contains definition objects like this: `{"type": "bind", "src": "/outside", "dst": "/inside", "options": "readonly"}.
# See the `--mount` documentation for the `docker run` command.
bambulab_spoolman_container_additional_volumes: "{{ bambulab_spoolman_container_additional_volumes_auto + bambulab_spoolman_container_additional_volumes_custom }}"
bambulab_spoolman_container_additional_volumes_auto: []
bambulab_spoolman_container_additional_volumes_custom: []

# bambulab_spoolman_container_labels_traefik_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `bambulab_spoolman_container_labels_additional_labels`.
bambulab_spoolman_container_labels_traefik_enabled: true
bambulab_spoolman_container_labels_traefik_docker_network: "{{ bambulab_spoolman_container_network }}"
bambulab_spoolman_container_labels_traefik_hostname: "{{ bambulab_spoolman_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/bambulab_spoolman`).
bambulab_spoolman_container_labels_traefik_path_prefix: "{{ bambulab_spoolman_path_prefix }}"
bambulab_spoolman_container_labels_traefik_rule: "Host(`{{ bambulab_spoolman_container_labels_traefik_hostname }}`)"
bambulab_spoolman_container_labels_traefik_priority: 0
bambulab_spoolman_container_labels_traefik_entrypoints: web-secure
bambulab_spoolman_container_labels_traefik_tls: "{{ bambulab_spoolman_container_labels_traefik_entrypoints != 'web' }}"
bambulab_spoolman_container_labels_traefik_tls_certResolver: default  # noqa var-naming

# Controls which additional headers to attach to all HTTP requests.
# To add your own custom request headers, use `bambulab_spoolman_container_labels_traefik_additional_request_headers_custom`
bambulab_spoolman_container_labels_traefik_additional_request_headers: "{{ bambulab_spoolman_container_labels_traefik_additional_request_headers_auto | combine(bambulab_spoolman_container_labels_traefik_additional_request_headers_custom) }}"
bambulab_spoolman_container_labels_traefik_additional_request_headers_auto: {}
bambulab_spoolman_container_labels_traefik_additional_request_headers_custom: {}

# Controls which additional headers to attach to all HTTP responses.
# To add your own custom response headers, use `bambulab_spoolman_container_labels_traefik_additional_response_headers_custom`
bambulab_spoolman_container_labels_traefik_additional_response_headers: "{{ bambulab_spoolman_container_labels_traefik_additional_response_headers_auto | combine(bambulab_spoolman_container_labels_traefik_additional_response_headers_custom) }}"
bambulab_spoolman_container_labels_traefik_additional_response_headers_auto: |
  {{
    {}
    | combine ({'X-XSS-Protection': bambulab_spoolman_http_header_xss_protection} if bambulab_spoolman_http_header_xss_protection else {})
    | combine ({'X-Content-Type-Options': bambulab_spoolman_http_header_content_type_options} if bambulab_spoolman_http_header_content_type_options else {})
    | combine ({'Content-Security-Policy': bambulab_spoolman_http_header_content_security_policy} if bambulab_spoolman_http_header_content_security_policy else {})
    | combine ({'Permissions-Policy': bambulab_spoolman_http_header_permissions_policy} if bambulab_spoolman_http_header_permissions_policy else {})
    | combine ({'Strict-Transport-Security': bambulab_spoolman_http_header_strict_transport_security} if bambulab_spoolman_http_header_strict_transport_security and bambulab_spoolman_container_labels_traefik_tls else {})
  }}
bambulab_spoolman_container_labels_traefik_additional_response_headers_custom: {}

# bambulab_spoolman_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
#
# Example:
# bambulab_spoolman_container_labels_additional_labels: |
#   my.label=1
#   another.label="here"
bambulab_spoolman_container_labels_additional_labels: "{{ bambulab_spoolman_container_labels_additional_labels_auto + bambulab_spoolman_container_labels_additional_labels_custom }}"
bambulab_spoolman_container_labels_additional_labels_auto: []
bambulab_spoolman_container_labels_additional_labels_custom: []

# A list of extra arguments to pass to the container (`docker run` command)
bambulab_spoolman_container_extra_arguments: []

# Specifies the value of the `X-XSS-Protection` header
# Stops pages from loading when they detect reflected cross-site scripting (XSS) attacks.
#
# Learn more about it is here:
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-XSS-Protection
# - https://portswigger.net/web-security/cross-site-scripting/reflected
bambulab_spoolman_http_header_xss_protection: "1; mode=block"

# Specifies the value of the `X-Content-Type-Options` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options
bambulab_spoolman_http_header_content_type_options: nosniff

# Specifies the value of the `Content-Security-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
bambulab_spoolman_http_header_content_security_policy: frame-ancestors 'self'

# Specifies the value of the `Permissions-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Permissions-Policy
bambulab_spoolman_http_header_permissions_policy: "{{ 'interest-cohort=()' if bambulab_spoolman_floc_optout_enabled else '' }}"

# Specifies the value of the `Strict-Transport-Security` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
bambulab_spoolman_http_header_strict_transport_security: "max-age=31536000; includeSubDomains{{ '; preload' if bambulab_spoolman_hsts_preload_enabled else '' }}"

# Controls whether to send a "Permissions-Policy interest-cohort=();" header along with all responses
#
# Learn more about what it is here:
# - https://www.eff.org/deeplinks/2021/03/googles-floc-terrible-idea
# - https://paramdeo.com/blog/opting-your-website-out-of-googles-floc-network
# - https://amifloced.org/
#
# Of course, a better solution is to just stop using browsers (like Chrome), which participate in such tracking practices.
# See: `bambulab_spoolman_http_header_permissions_policy`
bambulab_spoolman_floc_optout_enabled: true

# Controls if HSTS preloading is enabled
#
# In its strongest and recommended form, the [HSTS policy](https://www.chromium.org/hsts) includes all subdomains, and
# indicates a willingness to be "preloaded" into browsers:
# `Strict-Transport-Security: max-age=31536000; includeSubDomains; preload`
# For more information visit:
# - https://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
# - https://hstspreload.org/#opt-in
# See: `bambulab_spoolman_http_header_strict_transport_security`
bambulab_spoolman_hsts_preload_enabled: false

# List of systemd services that the Spoolman systemd service depends on
bambulab_spoolman_systemd_required_services_list: "{{ bambulab_spoolman_systemd_required_services_list_default + bambulab_spoolman_systemd_required_services_list_auto + bambulab_spoolman_systemd_required_services_list_custom }}"
bambulab_spoolman_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
bambulab_spoolman_systemd_required_services_list_auto: []
bambulab_spoolman_systemd_required_services_list_custom: []

# List of systemd services that the Spoolman systemd service wants
bambulab_spoolman_systemd_wanted_services_list: "{{ bambulab_spoolman_systemd_wanted_services_list_default + bambulab_spoolman_systemd_wanted_services_list_auto + bambulab_spoolman_systemd_wanted_services_list_custom }}"
bambulab_spoolman_systemd_wanted_services_list_default: []
bambulab_spoolman_systemd_wanted_services_list_auto: []
bambulab_spoolman_systemd_wanted_services_list_custom: []
