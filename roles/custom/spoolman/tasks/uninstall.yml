---
- name: Check existence of Spoolman systemd service
  ansible.builtin.stat:
    path: "{{ devture_systemd_docker_base_systemd_path }}/{{ spoolman_identifier }}.service"
  register: spoolman_service_stat

- name: Uninstall Spoolman systemd services and files
  when: spoolman_service_stat.stat.exists | bool
  block:
    - name: Ensure Spoolman systemd service is stopped
      ansible.builtin.service:
        name: "{{ spoolman_identifier }}"
        state: stopped
        enabled: false
        daemon_reload: true

    - name: Ensure Spoolman systemd service does not exist
      ansible.builtin.file:
        path: "{{ devture_systemd_docker_base_systemd_path }}/{{ spoolman_identifier }}.service"
        state: absent

    - name: Ensure Spoolman container network does not exist via community.docker.docker_network
      when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
      community.docker.docker_network:
        name: "{{ spoolman_container_network }}"
        state: absent

    - name: Ensure Spoolman container network does not exist via ansible.builtin.command
      when: devture_systemd_docker_base_container_network_creation_method == 'command'
      ansible.builtin.command:
        cmd: >-
          {{ devture_systemd_docker_base_host_command_docker }} network rm
          {{ spoolman_container_network }}
      register: network_deletion_result
      changed_when: spoolman_container_network in network_deletion_result.stdout

    - name: Ensure Spoolman path does not exist
      ansible.builtin.file:
        path: "{{ spoolman_base_path }}"
        state: absent
