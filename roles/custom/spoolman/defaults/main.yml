---
# Project source code URL: https://github.com/Donkie/Spoolman

spoolman_enabled: true

spoolman_identifier: spoolman
spoolman_base_path: "{{ mash_playbook_base_path }}/{{ spoolman_identifier }}"

# renovate: datasource=docker depName=ghcr.io/donkie/spoolman
spoolman_version: 0.23.1

spoolman_scheme: https

# The hostname at which Spoolman is served.
spoolman_hostname: ""

# The path at which Spoolman is exposed.
# This value must either be `/` or not end with a slash (e.g. `/spoolman`).
#
# Hosting Spoolman under a subpath does not seem to be possible due to Spoolman's
# technical limitations.
spoolman_path_prefix:
spoolman_data_path: "{{ spoolman_base_path }}/data"

spoolman_container_image: "{{ spoolman_container_image_registry_prefix }}donkie/spoolman:{{ spoolman_container_image_tag }}"
spoolman_container_image_tag: "{{ spoolman_version }}"
spoolman_container_image_registry_prefix: "{{ spoolman_container_image_registry_prefix_upstream }}"
spoolman_container_image_registry_prefix_upstream: "{{ spoolman_container_image_registry_prefix_upstream_default }}"
spoolman_container_image_registry_prefix_upstream_default: ghcr.io/
spoolman_container_image_force_pull: "{{ spoolman_container_image.endswith(':latest') }}"

spoolman_container_image_self_build: false
spoolman_container_image_self_build_name: "donkie/spoolman:{{ spoolman_container_image_self_build_repo_version }}"
spoolman_container_image_self_build_repo: "https://github.com/Donkie/Spoolman.git"
spoolman_container_image_self_build_repo_version: "{{ 'v' + spoolman_version if spoolman_version != 'latest' else 'main' }}"
spoolman_container_image_self_build_src_files_path: "{{ spoolman_base_path }}/docker-src"

# Controls whether the container exposes its HTTP port (tcp/3000 in the container).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:3000"), or empty string to not expose.
spoolman_container_http_host_bind_port: ""

# The base container network. It will be auto-created by this role if it doesn't exist already.
spoolman_container_network: "{{ spoolman_identifier }}"

# The port number in the container
spoolman_container_http_port: 8000

# Spoolman specific settings

spoolman_container_environment_port: "{{ spoolman_container_http_port }}"

spoolman_environment_variables_additional_variables: ""

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
# Use this to expose this container to another reverse proxy, which runs in a different container network.
spoolman_container_additional_networks: "{{ spoolman_container_additional_networks_auto + spoolman_container_additional_networks_custom }}"
spoolman_container_additional_networks_auto: []
spoolman_container_additional_networks_custom: []

# A list of additional "volumes" to mount in the container.
# This list gets populated dynamically at runtime. You can provide a different default value,
# if you wish to mount your own files into the container.
# Contains definition objects like this: `{"type": "bind", "src": "/outside", "dst": "/inside", "options": "readonly"}.
# See the `--mount` documentation for the `docker run` command.
spoolman_container_additional_volumes: "{{ spoolman_container_additional_volumes_auto + spoolman_container_additional_volumes_custom }}"
spoolman_container_additional_volumes_auto: []
spoolman_container_additional_volumes_custom: []

# spoolman_container_labels_traefik_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `spoolman_container_labels_additional_labels`.
spoolman_container_labels_traefik_enabled: true
spoolman_container_labels_traefik_docker_network: "{{ spoolman_container_network }}"
spoolman_container_labels_traefik_hostname: "{{ spoolman_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/spoolman`).
spoolman_container_labels_traefik_path_prefix: "{{ spoolman_path_prefix }}"
spoolman_container_labels_traefik_rule: "Host(`{{ spoolman_container_labels_traefik_hostname }}`)"
spoolman_container_labels_traefik_priority: 0
spoolman_container_labels_traefik_entrypoints: web-secure
spoolman_container_labels_traefik_tls: "{{ spoolman_container_labels_traefik_entrypoints != 'web' }}"
spoolman_container_labels_traefik_tls_certResolver: default  # noqa var-naming

# Controls which additional headers to attach to all HTTP requests.
# To add your own custom request headers, use `spoolman_container_labels_traefik_additional_request_headers_custom`
spoolman_container_labels_traefik_additional_request_headers: "{{ spoolman_container_labels_traefik_additional_request_headers_auto | combine(spoolman_container_labels_traefik_additional_request_headers_custom) }}"
spoolman_container_labels_traefik_additional_request_headers_auto: {}
spoolman_container_labels_traefik_additional_request_headers_custom: {}

# Controls which additional headers to attach to all HTTP responses.
# To add your own custom response headers, use `spoolman_container_labels_traefik_additional_response_headers_custom`
spoolman_container_labels_traefik_additional_response_headers: "{{ spoolman_container_labels_traefik_additional_response_headers_auto | combine(spoolman_container_labels_traefik_additional_response_headers_custom) }}"
spoolman_container_labels_traefik_additional_response_headers_auto: |
  {{
    {}
    | combine ({'X-XSS-Protection': spoolman_http_header_xss_protection} if spoolman_http_header_xss_protection else {})
    | combine ({'X-Content-Type-Options': spoolman_http_header_content_type_options} if spoolman_http_header_content_type_options else {})
    | combine ({'Content-Security-Policy': spoolman_http_header_content_security_policy} if spoolman_http_header_content_security_policy else {})
    | combine ({'Permissions-Policy': spoolman_http_header_permissions_policy} if spoolman_http_header_permissions_policy else {})
    | combine ({'Strict-Transport-Security': spoolman_http_header_strict_transport_security} if spoolman_http_header_strict_transport_security and spoolman_container_labels_traefik_tls else {})
  }}
spoolman_container_labels_traefik_additional_response_headers_custom: {}

# spoolman_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
#
# Example:
# spoolman_container_labels_additional_labels: |
#   my.label=1
#   another.label="here"
spoolman_container_labels_additional_labels: "{{ spoolman_container_labels_additional_labels_auto + spoolman_container_labels_additional_labels_custom }}"
spoolman_container_labels_additional_labels_auto: []
spoolman_container_labels_additional_labels_custom: []

# A list of extra arguments to pass to the container (`docker run` command)
spoolman_container_extra_arguments: []

# Specifies the value of the `X-XSS-Protection` header
# Stops pages from loading when they detect reflected cross-site scripting (XSS) attacks.
#
# Learn more about it is here:
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-XSS-Protection
# - https://portswigger.net/web-security/cross-site-scripting/reflected
spoolman_http_header_xss_protection: "1; mode=block"

# Specifies the value of the `X-Content-Type-Options` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options
spoolman_http_header_content_type_options: nosniff

# Specifies the value of the `Content-Security-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
spoolman_http_header_content_security_policy: frame-ancestors 'self'

# Specifies the value of the `Permissions-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Permissions-Policy
spoolman_http_header_permissions_policy: "{{ 'interest-cohort=()' if spoolman_floc_optout_enabled else '' }}"

# Specifies the value of the `Strict-Transport-Security` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
spoolman_http_header_strict_transport_security: "max-age=31536000; includeSubDomains{{ '; preload' if spoolman_hsts_preload_enabled else '' }}"

# Controls whether to send a "Permissions-Policy interest-cohort=();" header along with all responses
#
# Learn more about what it is here:
# - https://www.eff.org/deeplinks/2021/03/googles-floc-terrible-idea
# - https://paramdeo.com/blog/opting-your-website-out-of-googles-floc-network
# - https://amifloced.org/
#
# Of course, a better solution is to just stop using browsers (like Chrome), which participate in such tracking practices.
# See: `spoolman_http_header_permissions_policy`
spoolman_floc_optout_enabled: true

# Controls if HSTS preloading is enabled
#
# In its strongest and recommended form, the [HSTS policy](https://www.chromium.org/hsts) includes all subdomains, and
# indicates a willingness to be "preloaded" into browsers:
# `Strict-Transport-Security: max-age=31536000; includeSubDomains; preload`
# For more information visit:
# - https://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
# - https://hstspreload.org/#opt-in
# See: `spoolman_http_header_strict_transport_security`
spoolman_hsts_preload_enabled: false

# List of systemd services that the Spoolman systemd service depends on
spoolman_systemd_required_services_list: "{{ spoolman_systemd_required_services_list_default + spoolman_systemd_required_services_list_auto + spoolman_systemd_required_services_list_custom }}"
spoolman_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
spoolman_systemd_required_services_list_auto: []
spoolman_systemd_required_services_list_custom: []

# List of systemd services that the Spoolman systemd service wants
spoolman_systemd_wanted_services_list: "{{ spoolman_systemd_wanted_services_list_default + spoolman_systemd_wanted_services_list_auto + spoolman_systemd_wanted_services_list_custom }}"
spoolman_systemd_wanted_services_list_default: []
spoolman_systemd_wanted_services_list_auto: []
spoolman_systemd_wanted_services_list_custom: []
